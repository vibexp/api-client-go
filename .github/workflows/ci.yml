name: CI

# Verifies the client still generates cleanly against the backend OpenAPI spec
# and that the committed code builds/vets — without tagging a release. Runs on
# every push/PR to this repo, and can be dispatched against any backend ref to
# check generation ahead of a release. This is the same generation gate the
# Release workflow enforces.

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:
    inputs:
      backend_ref:
        description: 'vibexp/vibexp git ref (tag/branch/SHA) to generate from'
        required: false
        default: 'main'

permissions:
  contents: read

jobs:
  generate-and-verify:
    name: Generate & verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout api-client-go
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Checkout backend spec source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          repository: vibexp/vibexp
          ref: ${{ inputs.backend_ref || 'main' }}
          path: spec-src

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'

      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5  # v5.5.0
        with:
          go-version: '1.24'

      # Regenerate from the spec, then make sure it compiles and vets — fails if
      # generation is empty/broken or the spec produces uncompilable output.
      - name: Generate, build & vet
        run: |
          make generate
          go build ./...
          go vet ./...
        env:
          VIBEXP_SPEC: spec-src/backend/openapi.yaml
