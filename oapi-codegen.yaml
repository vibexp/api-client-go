# oapi-codegen configuration for the generated VibeXP Go client.
#
# Generates a net/http client (Client + ClientWithResponses) and models from the
# Redocly bundle of the backend OpenAPI spec (multi-file $refs pre-resolved —
# kin-openapi, oapi-codegen's parser, does not resolve the paths/*.yaml layout
# natively, so we bundle first; same approach as the backend server codegen).
#
# Regenerate with: ./scripts/generate.sh  (or `make generate`)
package: vibexp
output: vibexp.gen.go
generate:
  models: true
  client: true
output-options:
  # Suffix the ClientWithResponses wrapper types so they don't collide with
  # schema models of the same name (e.g. the `LoginResponse`/`HealthResponse`
  # components clash with the `Login`/`Health` operation response wrappers).
  response-type-suffix: HTTPResponse
